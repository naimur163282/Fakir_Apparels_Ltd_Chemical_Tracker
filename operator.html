<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FAL Chemical System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Rajdhani',sans-serif;background:#000;color:#00ffff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,#001a2e 0%,#000 70%);z-index:-2}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(0,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,0.03) 1px,transparent 1px);background-size:40px 40px;z-index:-1;animation:gridMove 20s linear infinite}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:40px 40px}}
.scanline{position:fixed;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,#00ffff,transparent);animation:scan 4s linear infinite;z-index:100;opacity:.3}
@keyframes scan{0%{top:0}100%{top:100%}}
.card{background:rgba(0,20,40,0.85);border:1px solid rgba(0,255,255,0.3);border-radius:4px;padding:24px;width:100%;max-width:500px;position:relative;backdrop-filter:blur(10px);box-shadow:0 0 40px rgba(0,255,255,0.1),inset 0 0 40px rgba(0,255,255,0.02)}
.card::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:2px;background:linear-gradient(90deg,transparent,#00ffff,transparent)}
.card::after{content:'';position:absolute;bottom:-1px;left:20px;right:20px;height:2px;background:linear-gradient(90deg,transparent,#00ffff,transparent)}
.corner{position:absolute;width:16px;height:16px;border-color:#00ffff;border-style:solid}
.corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.header{text-align:center;margin-bottom:24px;position:relative}
.header h1{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:#00ffff;letter-spacing:4px;text-shadow:0 0 20px #00ffff;margin-bottom:4px}
.header p{font-size:11px;color:#005f7a;letter-spacing:2px;text-transform:uppercase}
.header-line{width:100%;height:1px;background:linear-gradient(90deg,transparent,#00ffff,transparent);margin-top:12px}
.status-bar{display:flex;justify-content:space-between;margin-bottom:20px;font-size:10px;color:#006680;font-family:'Orbitron',monospace}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00ffff;box-shadow:0 0 6px #00ffff;margin-right:4px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
label{display:block;font-size:10px;color:#00aacc;font-weight:600;text-transform:uppercase;letter-spacing:2px;margin:14px 0 5px;font-family:'Orbitron',monospace}
select,input{width:100%;padding:10px 12px;background:rgba(0,255,255,0.03);border:1px solid rgba(0,255,255,0.2);border-radius:2px;color:#00ffff;font-size:13px;outline:none;font-family:'Rajdhani',sans-serif;transition:all .3s}
select:focus,input:focus{border-color:#00ffff;box-shadow:0 0 15px rgba(0,255,255,0.2);background:rgba(0,255,255,0.06)}
select option{background:#001a2e;color:#00ffff}
input::placeholder{color:#003a4a}
.row{display:flex;gap:8px}
.row>div{flex:1}
.mic-row{display:flex;gap:8px}
.mic-row input{flex:1}
.mic{background:rgba(0,100,200,0.2);border:1px solid rgba(0,150,255,0.4);border-radius:2px;padding:10px 14px;cursor:pointer;font-size:16px;flex-shrink:0;transition:all .3s;color:#00ffff}
.mic:hover{background:rgba(0,100,200,0.4);box-shadow:0 0 15px rgba(0,150,255,0.4)}
.mic.on{background:rgba(200,0,0,0.3);border-color:rgba(255,0,0,0.6);box-shadow:0 0 20px rgba(255,0,0,0.4);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.sugg{background:rgba(0,10,20,0.95);border:1px solid rgba(0,255,255,0.3);border-radius:2px;margin-top:3px;display:none;max-height:160px;overflow-y:auto;z-index:100;position:relative}
.sugg div{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(0,255,255,0.1);color:#00ccdd;transition:all .2s}
.sugg div:hover{background:rgba(0,255,255,0.1);color:#00ffff;padding-left:16px}
.divider{border:none;border-top:1px solid rgba(0,255,255,0.15);margin:16px 0;position:relative}
.divider::after{content:'◆';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#000;padding:0 8px;color:rgba(0,255,255,0.4);font-size:10px}
.chem-section label{color:#00ff88}
.chem-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.chem-item{background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.2);border-radius:2px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#00ff88;transition:all .3s}
.chem-item:hover{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.4)}
.chem-item .name{flex:1;font-family:'Orbitron',monospace;font-size:11px}
.chem-item .amt{color:#00aacc;font-size:12px;margin:0 10px}
.chem-item button{background:rgba(255,0,80,0.2);border:1px solid rgba(255,0,80,0.4);border-radius:2px;color:#ff0050;padding:3px 8px;cursor:pointer;font-size:11px;transition:all .2s}
.chem-item button:hover{background:rgba(255,0,80,0.4);box-shadow:0 0 10px rgba(255,0,80,0.3)}
.add-btn{width:100%;margin-top:10px;padding:11px;background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.3);border-radius:2px;color:#00ff88;font-size:13px;font-weight:600;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:2px;transition:all .3s}
.add-btn:hover{background:rgba(0,255,136,0.15);box-shadow:0 0 20px rgba(0,255,136,0.2)}
.count-badge{display:inline-block;background:rgba(0,255,255,0.15);border:1px solid rgba(0,255,255,0.4);color:#00ffff;border-radius:2px;padding:1px 8px;font-size:10px;margin-left:8px;font-family:'Orbitron',monospace}
.empty-list{text-align:center;color:#003a4a;font-size:12px;padding:12px;letter-spacing:1px;font-family:'Orbitron',monospace}
.submit-btn{width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,rgba(0,150,255,0.15),rgba(0,255,255,0.1));border:1px solid rgba(0,255,255,0.5);border-radius:2px;color:#00ffff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:3px;transition:all .3s;position:relative;overflow:hidden}
.submit-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,255,255,0.1),transparent);transition:left .5s}
.submit-btn:hover::before{left:100%}
.submit-btn:hover{box-shadow:0 0 30px rgba(0,255,255,0.3);border-color:#00ffff}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}
.toast{margin-top:12px;padding:12px;border-radius:2px;text-align:center;font-size:12px;font-weight:600;font-family:'Orbitron',monospace;letter-spacing:1px;display:none}
.toast.ok{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.4);color:#00ff88;display:block;box-shadow:0 0 20px rgba(0,255,136,0.1)}
.toast.err{background:rgba(255,0,80,0.1);border:1px solid rgba(255,0,80,0.4);color:#ff0050;display:block;box-shadow:0 0 20px rgba(255,0,80,0.1)}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="card">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="header">
    <h1>⬡ FAL CHEM SYS</h1>
    <p>Fakir Apparels Ltd — Chemical Input Terminal</p>
    <div class="header-line"></div>
  </div>
  <div class="status-bar">
    <span><span class="status-dot"></span>SYSTEM ONLINE</span>
    <span id="clock">--:--:--</span>
    <span>NODE: WASH-FLOOR</span>
  </div>

  <label>▸ Operator ID</label>
  <select id="op">
    <option value="">[ SELECT OPERATOR ]</option>
    <option>Raedh</option><option>Hasan</option><option>Sabbir (বরিশাল)</option><option>Rahinur</option><option>Sochin</option><option>Rahman</option><option>Sabbir</option><option>Rabbani</option><option>Rashid</option><option>Nurullah</option><option>Junayed</option><option>Momrul</option><option>Mostafiz</option><option>Saju</option><option>Mahfuz</option><option>Robin</option><option>Mahabub</option><option>Sojib</option><option>Hossain</option><option>Nayeem</option><option>Jewel</option><option>Lipon</option><option>Biplob</option><option>Showrob</option><option>Mahim</option><option>Parvez</option><option>Keshob</option><option>Mohasin</option><option>Jakir</option><option>Mizan</option><option>Sariful</option><option>Kawsar - 1</option><option>Kawser - 2</option><option>Sudorshon</option><option>Jahangir</option><option>Lokman</option><option>Yamin</option><option>Arif</option><option>Kamal</option><option>Babul</option><option>Sumon</option><option>Rifat</option>
  </select>

  <label>▸ Buyer</label>
  <input id="buyer" placeholder="Enter buyer name..."/>

  <label>▸ Style Code</label>
  <input id="style" placeholder="Style number or name..."/>

  <div class="row">
    <div>
      <label>▸ Color</label>
      <input id="color" placeholder="Color..."/>
    </div>
    <div>
      <label>▸ Qty (pcs)</label>
      <input id="qty" type="number" placeholder="0" min="0"/>
    </div>
  </div>

  <div class="divider"></div>

  <div class="chem-section">
    <label>▸ Chemical Input <span class="count-badge" id="chemCount">0</span></label>
    <div class="mic-row">
      <input id="chemIn" placeholder="Type or speak chemical..." oninput="showSugg(this.value)"/>
      <button class="mic" id="micBtn" onclick="toggleMic()" title="Voice Input">🎙</button>
    </div>
    <div class="sugg" id="sugg"></div>

    <label style="margin-top:10px">▸ Or Select</label>
    <select id="chemSel" onchange="pickChem(this.value)">
      <option value="">[ SELECT CHEMICAL ]</option>
      <option>Silicon</option><option>Glauber Salt</option><option>Eropen-R</option><option>Sequestering Agent</option><option>Avco Fix PDC</option><option>Novapret SPF</option><option>Meta</option><option>Acid</option><option>Salt</option><option>Ot Conc</option><option>Cra</option><option>Silvatol</option><option>Peroxide</option><option>Tubingal</option><option>Aticres</option><option>Bainder</option><option>Silicone</option><option>Textport</option><option>Supradet</option><option>Sera Gal</option><option>C Scamas</option><option>Nutra Acid</option><option>Softnar</option><option>Lavelling</option><option>Jingen Neutra Acid</option><option>Antiback Stainer</option><option>Anticreasing Agent</option><option>Meta Bi Sulphite</option><option>Soda Ash</option><option>Caustic Soda</option><option>Hydrogen Peroxide</option><option>Detergent</option><option>Leveling Agent</option><option>Potassium Permanganate</option><option>Softener</option><option>Saftnar</option>
    </select>

    <div class="row" style="margin-top:10px">
      <div style="flex:2"><input id="amount" type="number" placeholder="Amount..." min="0" step="0.01"/></div>
      <div style="flex:1"><select id="unit"><option>KG</option><option>Liter</option><option>Gram</option><option>ML</option><option>Drum</option><option>Bag</option></select></div>
    </div>

    <button class="add-btn" onclick="addChem()">+ ADD TO QUEUE</button>
    <div class="chem-list" id="chemList"><div class="empty-list">// NO CHEMICALS QUEUED</div></div>
  </div>

  <div class="divider"></div>

  <label>▸ Notes</label>
  <input id="notes" placeholder="Optional remarks..."/>

  <button class="submit-btn" id="submitBtn" onclick="submitLog()">⬡ TRANSMIT LOG</button>
  <div class="toast" id="toast"></div>
</div>

<script>
const SURL="https://ynnfvmezkrqkuiggprtb.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlubmZ2bWV6a3Jxa3VpZ2dwcnRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjU3MTksImV4cCI6MjA4OTIwMTcxOX0.b3ykhcba-oDxWfjeMQvK4_4-VkGVeLeapVEfoXlztjw";

// Clock
setInterval(()=>{document.getElementById("clock").textContent=new Date().toLocaleTimeString('en-US',{hour12:false})},1000);

const chems=["Silicon","Glauber Salt","Eropen-R","Sequestering Agent","Avco Fix PDC","Novapret SPF","Meta","Acid","Salt","Ot Conc","Cra","Silvatol","Peroxide","Tubingal","Aticres","Bainder","Silicone","Textport","Supradet","Sera Gal","C Scamas","Nutra Acid","Softnar","Lavelling","Jingen Neutra Acid","Antiback Stainer","Anticreasing Agent","Meta Bi Sulphite","Soda Ash","Caustic Soda","Hydrogen Peroxide","Detergent","Leveling Agent","Potassium Permanganate","Softener","Saftnar"];
const alias={"meta":"Meta Bi Sulphite","metabi":"Meta Bi Sulphite","sodium meta":"Meta Bi Sulphite","soda":"Soda Ash","caustic":"Caustic Soda","h2o2":"Hydrogen Peroxide","peroxide":"Hydrogen Peroxide","kp":"Potassium Permanganate","pp":"Potassium Permanganate","soft":"Softener","seq":"Sequestering Agent","level":"Leveling Agent","glauber":"Glauber Salt","acid":"Acid","salt":"Salt","silicon":"Silicon","silicone":"Silicone","detergent":"Detergent","cra":"Cra","ot":"Ot Conc"};

let chemItems=[];

function showToast(msg,type){const t=document.getElementById("toast");t.className="toast "+type;t.textContent=msg;if(type==="ok")setTimeout(()=>{t.style.display="none";t.className="toast"},4000)}
function matchChem(t){t=t.toLowerCase().trim();if(alias[t])return alias[t];for(let k in alias)if(t.includes(k))return alias[k];return chems.find(c=>c.toLowerCase().includes(t))||t}
function showSugg(v){const b=document.getElementById("sugg");if(!v){b.style.display="none";return}const m=chems.filter(c=>c.toLowerCase().includes(v.toLowerCase())).slice(0,5);if(!m.length){b.style.display="none";return}b.innerHTML=m.map(x=>`<div onclick="pickChem('${x}')">${x}</div>`).join("");b.style.display="block"}
function pickChem(n){document.getElementById("chemIn").value=n;document.getElementById("chemSel").value=n;document.getElementById("sugg").style.display="none"}

let rec;
function toggleMic(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Use Chrome for voice");return}const btn=document.getElementById("micBtn");if(rec){rec.stop();return}rec=new SR();rec.lang="en-US";rec.onresult=e=>{pickChem(matchChem(e.results[0][0].transcript));btn.classList.remove("on");rec=null};rec.onerror=()=>{btn.classList.remove("on");rec=null};rec.onend=()=>{btn.classList.remove("on");rec=null};rec.start();btn.classList.add("on")}

function addChem(){
  const chem=document.getElementById("chemIn").value.trim()||document.getElementById("chemSel").value;
  const amount=document.getElementById("amount").value;
  const unit=document.getElementById("unit").value;
  if(!chem){showToast("⚠ NO CHEMICAL SPECIFIED","err");return}
  if(!amount||parseFloat(amount)<=0){showToast("⚠ INVALID AMOUNT","err");return}
  chemItems.push({chemical:chem,amount:parseFloat(amount),unit});
  renderChemList();
  document.getElementById("chemIn").value="";
  document.getElementById("chemSel").selectedIndex=0;
  document.getElementById("amount").value="";
  document.getElementById("sugg").style.display="none";
  showToast("✓ "+chem.toUpperCase()+" ADDED TO QUEUE","ok");
}

function removeChem(i){chemItems.splice(i,1);renderChemList()}

function renderChemList(){
  document.getElementById("chemCount").textContent=chemItems.length;
  const list=document.getElementById("chemList");
  if(!chemItems.length){list.innerHTML='<div class="empty-list">// NO CHEMICALS QUEUED</div>';return}
  list.innerHTML=chemItems.map((c,i)=>`<div class="chem-item"><span class="name">◈ ${c.chemical}</span><span class="amt">${c.amount} ${c.unit}</span><button onclick="removeChem(${i})">✕ DEL</button></div>`).join("")
}

async function submitLog(){
  const op=document.getElementById("op").value;
  if(!op){showToast("⚠ SELECT OPERATOR ID","err");return}
  if(!chemItems.length){showToast("⚠ QUEUE IS EMPTY","err");return}
  const btn=document.getElementById("submitBtn");
  btn.disabled=true;btn.textContent="TRANSMITTING...";
  const base={operator:op,buyer:document.getElementById("buyer").value,style:document.getElementById("style").value,color:document.getElementById("color").value,garment_quantity:parseInt(document.getElementById("qty").value)||0,notes:document.getElementById("notes").value,logged_at:new Date().toISOString()};
  try{
    const rows=chemItems.map(c=>({...base,chemical:c.chemical,amount:c.amount,unit:c.unit}));
    const r=await fetch(`${SURL}/rest/v1/chemical_logs`,{method:"POST",headers:{"Content-Type":"application/json","apikey":SKEY,"Authorization":`Bearer ${SKEY}`,"Prefer":"return=minimal"},body:JSON.stringify(rows)});
    if(r.ok){
      showToast(`✓ ${chemItems.length} CHEMICAL(S) LOGGED SUCCESSFULLY`,"ok");
      chemItems=[];renderChemList();
      document.querySelectorAll("input").forEach(e=>e.value="");
      document.querySelectorAll("select").forEach(e=>e.selectedIndex=0);
    }else{const err=await r.text();console.error(err);showToast("✕ SERVER REJECTED — CHECK LOGS","err")}
  }catch(e){console.error(e);showToast("✕ NETWORK ERROR — RETRY","err")}
  btn.disabled=false;btn.textContent="⬡ TRANSMIT LOG";
}
</script>
</body>
</html>
